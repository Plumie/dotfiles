set -g prefix C-a

set -s extended-keys on

set -g mouse on
set -g status-position top
set-window-option -g mode-keys vi
set -g base-index 1

set-option -g renumber-windows on
bind 0 move-window -t0

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r Enter resize-pane -Z

bind s split-window -c "#{pane_current_path}" -h
bind d split-window -c "#{pane_current_path}" -v
bind q kill-pane
bind n new-window
bind c kill-window
bind r source-file ~/.tmux.conf

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'fabioluciano/tmux-tokyo-night'

set -g @theme_transparent_status_bar 'true'
set -g @theme_right_separator ""
set -g @theme_transparent_right_separator_inverse ""

set -g @theme_left_separator ""
set -g @theme_transparent_left_separator_inverse ""

set-option -g automatic-rename off

set -g @theme_session_format "#S"
set -g @theme_session_icon "♪"
set -g @theme_disable_plugins 1
set -g @theme_active_pane_border_style "#ffffff"
set -g @theme_inactive_pane_border_style "#ffffff"

set-hook -g session-created 'run-shell "tmux send-keys -t \"#{session_name}\" \"fastfetch\" C-m"'

run '~/.tmux/plugins/tpm/tpm'
