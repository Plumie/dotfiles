set -g prefix C-a
set -s extended-keys on
set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g automatic-rename off
set-window-option -g mode-keys vi

set -g status-position top
set -g status-style "bg=default"
set -g status-interval 1
set -g status-left ""
set -g status-right ""
set -g status-format[0] '#[align=left] #{W:#[fg=#555555][#I] ,#[fg=#ffffff bold][#I] }#[align=absolute-centre,fg=#ffffff]#(~/.local/bin/tmux-path.sh "#{pane_current_path}")/#{b:pane_current_path}'

set -g pane-active-border-style "fg=#ffffff"
set -g pane-border-style "fg=#ffffff"

bind 0 move-window -t0
bind s split-window -c "#{pane_current_path}" -h
bind d split-window -c "#{pane_current_path}" -v
bind q kill-pane
bind n new-window
bind c kill-window
bind r source-file ~/.tmux.conf
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r Enter resize-pane -Z

set-hook -g session-created 'run-shell "tmux send-keys -t \"#{session_name}\"'

set -g @plugin 'christoomey/vim-tmux-navigator'
run '~/.tmux/plugins/tpm/tpm'
